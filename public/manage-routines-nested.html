<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Exam Routines - BTEB Format</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    .table-container { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
    th { background-color: #f1f5f9; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; color: #475569; }
    td { vertical-align: top; }
    input, select {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #e2e8f0;
      border-radius: 0.375rem;
      outline: none;
      font-size: 0.875rem;
      transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
    }
    input:focus, select:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: 0.375rem;
      transition: background-color 0.15s ease-in-out;
      cursor: pointer;
    }
    .btn-primary { background-color: #2563eb; color: #ffffff; }
    .btn-primary:hover { background-color: #1d4ed8; }
    .btn-secondary { background-color: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
    .btn-secondary:hover { background-color: #e2e8f0; }
    .btn-danger { background-color: #fef2f2; color: #dc2626; border: 1px solid #fecaca; padding: 0.25rem; border-radius: 0.25rem; }
    .btn-danger:hover { background-color: #fee2e2; }
    .trash-icon { width: 1.25rem; height: 1.25rem; }
  </style>
</head>
<body class="p-4 md:p-8">

  <div class="max-w-7xl mx-auto bg-white p-6 rounded-xl table-container">
    <div class="flex justify-between items-center mb-6 border-b pb-4">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Manage Exam Routines</h1>
        <p class="text-sm text-gray-500 mt-1">Hierarchical routine entry mirroring official BTEB structure</p>
      </div>
      <button onclick="saveRoutine()" class="btn btn-primary shadow-sm">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
        Save Routine
      </button>
    </div>

    <!-- Global Fields -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Regulation</label>
        <select id="globalRegulation">
          <option value="2022">2022 Probidhan</option>
          <option value="2016">2016 Probidhan</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Curriculum</label>
        <input type="text" id="globalCurriculum" value="Diploma in Engineering">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Publish Date</label>
        <input type="date" id="globalPublishDate">
      </div>
    </div>

    <div class="overflow-x-auto border border-gray-200 rounded-lg">
      <table class="w-full text-left border-collapse min-w-[900px]" id="routineTable">
        <thead>
          <tr>
            <th class="border-b border-r border-gray-200 p-3 w-48">Date & Day</th>
            <th class="border-b border-r border-gray-200 p-3 w-32">Time/Shift</th>
            <th class="border-b border-r border-gray-200 p-3 w-56">Semester/Phase</th>
            <th class="border-b border-r border-gray-200 p-3 w-16 text-center">Sl No</th>
            <th class="border-b border-r border-gray-200 p-3 w-32">Subject Code</th>
            <th class="border-b border-r border-gray-200 p-3 min-w-[200px]">Subject Name</th>
            <th class="border-b border-r border-gray-200 p-3 w-48">Technology/Department</th>
            <th class="border-b border-gray-200 p-3 w-16 text-center">Act</th>
          </tr>
        </thead>
        <tbody id="routineBody">
          <!-- Rendered by JS -->
        </tbody>
      </table>
    </div>

    <div class="mt-6 flex justify-center">
      <button onclick="addDateBlock()" class="btn btn-secondary shadow-sm">
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        Add Another Date/Time Block
      </button>
    </div>
  </div>

<script>
  // Initial State structure matching BTEB Table Hierarchy
  let state = [
    {
      id: generateId(),
      examDate: '',
      day: '',
      timeShift: 'সকাল ১০:০০',
      semesters: [
        {
          id: generateId(),
          semesterPhase: '',
          subjects: [
            generateEmptySubject()
          ]
        }
      ]
    }
  ];

  function generateId() {
    return Math.random().toString(36).substr(2, 9);
  }

  function generateEmptySubject() {
    return { id: generateId(), subjectCode: '', subjectName: '', technology: '' };
  }

  function addDateBlock() {
    state.push({
      id: generateId(),
      examDate: '',
      day: '',
      timeShift: 'সকাল ১০:০০',
      semesters: [{
        id: generateId(),
        semesterPhase: '',
        subjects: [generateEmptySubject()]
      }]
    });
    render();
  }

  function addSemester(docIndex) {
    state[docIndex].semesters.push({
      id: generateId(),
      semesterPhase: '',
      subjects: [generateEmptySubject()]
    });
    render();
  }

  function addSubject(docIndex, semIndex) {
    state[docIndex].semesters[semIndex].subjects.push(generateEmptySubject());
    render();
  }

  function removeDateBlock(docIndex) {
    if (confirm('Delete entire date block?')) {
      state.splice(docIndex, 1);
      render();
    }
  }

  function removeSubject(docIndex, semIndex, subIndex) {
    const sem = state[docIndex].semesters[semIndex];
    if (sem.subjects.length > 1) {
      sem.subjects.splice(subIndex, 1);
    } else {
      if (state[docIndex].semesters.length > 1) {
        state[docIndex].semesters.splice(semIndex, 1);
      } else {
        alert("Cannot remove the last subject of the last semester. Remove the Date Block instead.");
        return;
      }
    }
    render();
  }

  function updateField(obj, field, value) {
    obj[field] = value;
  }

  function handleDateChange(docIndex, value) {
    state[docIndex].examDate = value;
    if (value) {
      const d = new Date(value);
      // Determine day string
      state[docIndex].day = d.toLocaleDateString('bn-BD', { weekday: 'long' });
    } else {
      state[docIndex].day = '';
    }
    render();
  }

  function render() {
    const tbody = document.getElementById('routineBody');
    tbody.innerHTML = '';

    state.forEach((dateBlock, dIndex) => {
      // Calculate rowSpans
      const totalSubjectsInDateBlock = dateBlock.semesters.reduce((sum, sem) => sum + sem.subjects.length, 0);

      dateBlock.semesters.forEach((sem, sIndex) => {
        const totalSubjectsInSem = sem.subjects.length;

        sem.subjects.forEach((sub, subIndex) => {
          const isFirstSubInSem = subIndex === 0;
          const isFirstSemInDate = sIndex === 0;
          const isFirstRowInDate = isFirstSubInSem && isFirstSemInDate;

          const tr = document.createElement('tr');
          tr.className = "border-b border-gray-200 hover:bg-gray-50 transition-colors";

          // 1. Date & Day Block
          if (isFirstRowInDate) {
            const tdDate = document.createElement('td');
            tdDate.rowSpan = totalSubjectsInDateBlock;
            tdDate.className = "border-r border-gray-200 p-3 bg-white";
            tdDate.innerHTML = `
              <div class="flex flex-col gap-2 relative group">
                <input type="date" value="${dateBlock.examDate || ''}" onchange="handleDateChange(${dIndex}, this.value)" class="font-bold text-gray-800">
                <input type="text" placeholder="Day" value="${dateBlock.day || ''}" readonly class="bg-gray-50 text-gray-500 cursor-not-allowed">
                <button onclick="removeDateBlock(${dIndex})" class="absolute -top-3 -right-3 btn-danger hidden group-hover:block" title="Remove Block">
                   <svg class="trash-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
              </div>
            `;
            tr.appendChild(tdDate);

            // 2. Time Block
            const tdTime = document.createElement('td');
            tdTime.rowSpan = totalSubjectsInDateBlock;
            tdTime.className = "border-r border-gray-200 p-3 bg-white";
            tdTime.innerHTML = `
              <input type="text" placeholder="e.g. সকাল ১০:০০" value="${dateBlock.timeShift || ''}" onchange="state[${dIndex}].timeShift = this.value">
            `;
            tr.appendChild(tdTime);
          }

          // 3. Semester Block
          if (isFirstSubInSem) {
            const tdSem = document.createElement('td');
            tdSem.rowSpan = totalSubjectsInSem;
            tdSem.className = "border-r border-gray-200 p-3 bg-white";
            tdSem.innerHTML = `
              <div class="flex flex-col gap-3 h-full justify-between">
                <textarea rows="2" placeholder="e.g. ৫ম পর্ব (২০১৬ প্রবিধান)" onchange="state[${dIndex}].semesters[${sIndex}].semesterPhase = this.value" class="w-full p-2 border border-blue-200 rounded-md outline-none focus:border-blue-500 bg-blue-50/30 resize-none">${sem.semesterPhase || ''}</textarea>
                <div class="flex flex-col gap-2 mt-2">
                  <button onclick="addSubject(${dIndex}, ${sIndex})" class="text-xs text-blue-600 font-semibold hover:text-blue-800 text-left flex items-center">+ Add Subject here</button>
                  ${isFirstSemInDate ? `<button onclick="addSemester(${dIndex})" class="text-xs text-emerald-600 font-semibold hover:text-emerald-800 text-left flex items-center mt-2 border-t pt-2">+ Add Another Semester</button>` : ''}
                </div>
              </div>
            `;
            tr.appendChild(tdSem);
          }

          // 4. Sl No
          const tdSl = document.createElement('td');
          tdSl.className = "border-r border-gray-200 p-3 text-center text-gray-500 font-medium";
          tdSl.innerText = subIndex + 1;
          tr.appendChild(tdSl);

          // 5. Subject Code
          const tdCode = document.createElement('td');
          tdCode.className = "border-r border-gray-200 p-2";
          tdCode.innerHTML = `<input type="text" placeholder="Subject Code" value="${sub.subjectCode || ''}" onchange="state[${dIndex}].semesters[${sIndex}].subjects[${subIndex}].subjectCode = this.value">`;
          tr.appendChild(tdCode);

          // 6. Subject Name
          const tdName = document.createElement('td');
          tdName.className = "border-r border-gray-200 p-2";
          tdName.innerHTML = `<input type="text" placeholder="Subject Name" value="${sub.subjectName || ''}" onchange="state[${dIndex}].semesters[${sIndex}].subjects[${subIndex}].subjectName = this.value">`;
          tr.appendChild(tdName);

          // 7. Technology
          const tdTech = document.createElement('td');
          tdTech.className = "border-r border-gray-200 p-2";
          tdTech.innerHTML = `<input type="text" placeholder="Technology/Department" value="${sub.technology || ''}" onchange="state[${dIndex}].semesters[${sIndex}].subjects[${subIndex}].technology = this.value">`;
          tr.appendChild(tdTech);

          // 8. Actions
          const tdAct = document.createElement('td');
          tdAct.className = "p-2 text-center";
          tdAct.innerHTML = `
            <button onclick="removeSubject(${dIndex}, ${sIndex}, ${subIndex})" class="btn-danger inline-flex" title="Remove Subject Row">
              <svg class="trash-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
            </button>
          `;
          tr.appendChild(tdAct);

          tbody.appendChild(tr);
        });
      });
    });
  }

  function saveRoutine() {
    // Collect all data into nested JSON
    const payload = {
      regulation: document.getElementById('globalRegulation').value,
      curriculum: document.getElementById('globalCurriculum').value,
      publishDate: document.getElementById('globalPublishDate').value,
      blocks: state // Hierarchical nested array
    };
    
    console.log("SENDING TO BACKEND API:", JSON.stringify(payload, null, 2));
    
    // Simulate API call
    alert("Data structured and logged to console successfully! Check DevTools.");
  }

  // Initial render
  render();
</script>
</body>
</html>
